<!doctype html>
<html lang="en">
  <head>
    {% include "head.html" %}
  </head>

  <body>
    <script type="module">
      import { getAuth } from "/js/auth.js";
      import { validateReturnToParam } from "/js/navigation.js";

      async function main() {
        const params = new URLSearchParams(window.location.search);

        const code = params.get("code");
        const state = params.get("state");
        const iss = params.get("iss");

        if (!code || !state || !iss) {
          window.location.href = "/";
          return;
        }

        const parsedState = JSON.parse(decodeURIComponent(state));

        if (
          parsedState.loopback === true &&
          window.env.environment === "development" &&
          window.location.hostname !== "localhost"
        ) {
          window.location.href =
            "http://localhost:8080/callback.html" + window.location.search;
          return;
        }
        const returnTo = validateReturnToParam(parsedState.returnTo);
        const auth = await getAuth();
        try {
          await auth.handleOauthCallback(window.location.href);
          window.location.href = returnTo ?? "/";
          return;
        } catch (error) {
          console.error("error", error);
          const params = new URLSearchParams();
          params.set(
            "error_message",
            "OAuth callback failed. Please try again.",
          );
          if (returnTo) {
            params.set("returnTo", returnTo);
          }
          window.location.href = "/login?" + params.toString();
          return;
        }
      }
      main();
    </script>
  </body>
</html>
